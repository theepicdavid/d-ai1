<!DOCTYPE html>
<html>
<head>
  <title>D-AI</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto;
      background: #0b0f19;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 14px;
      text-align: center;
      background: #0f172a;
      border-bottom: 1px solid #1f2937;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    #chat {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg {
      padding: 12px 14px;
      border-radius: 14px;
      max-width: 75%;
      white-space: pre-wrap;
      line-height: 1.4;
      font-size: 14px;
    }

    .user {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .ai {
      background: #111827;
      border: 1px solid #1f2937;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    #inputBox {
      display: flex;
      padding: 12px;
      background: #0f172a;
      border-top: 1px solid #1f2937;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #1f2937;
      outline: none;
      background: #0b1220;
      color: white;
      font-size: 14px;
    }

    input:focus {
      border-color: #2563eb;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #16a34a;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .typing {
      font-style: italic;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<header>D-AI 🤖</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Ask something..." />
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const btn = document.getElementById("sendBtn");

// session memory (DO NOT REMOVE - required for backend)
const sessionId =
  localStorage.getItem("sessionId") ||
  crypto.randomUUID();

localStorage.setItem("sessionId", sessionId);

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  input.value = "";

  add(message, "user");

  const aiMsg = add("Thinking...", "ai");
  aiMsg.classList.add("typing");

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        message,
        sessionId
      })
    });

    const data = await res.json();

    aiMsg.classList.remove("typing");
    aiMsg.textContent = data.reply;

  } catch (err) {
    aiMsg.classList.remove("typing");
    aiMsg.textContent = "Error contacting AI.";
  }

  btn.disabled = false;
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
