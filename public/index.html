<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>D-AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
  --bg:#0a0c10;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#4f46e5;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:rgba(17,24,39,0.6);
  border-right:1px solid var(--border);
  backdrop-filter: blur(12px);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.brand{font-weight:800}

.status{
  font-size:12px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.btnRow{
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  font-size:12px;
}

.new{background:var(--accent);color:white;}
.shuffle{background:rgba(255,255,255,0.08);color:var(--text);}

.card{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
}

.suggestions div{
  padding:9px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
}

.suggestions div:hover{
  background:rgba(255,255,255,0.06);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

/* HEADER */
header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(15,23,42,0.5);
  display:flex;
  align-items:center;
  gap:10px;
}

/* CHAT */
#chat{
  flex:1;
  padding:24px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-bottom:160px;
}

.msg{
  max-width:72%;
  padding:12px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.6;
  white-space:pre-wrap;
  animation:pop .12s ease;
}

@keyframes pop{
  from{transform:scale(0.98);opacity:0}
  to{transform:scale(1);opacity:1}
}

.user{
  align-self:flex-end;
  background:#2563eb;
}

.ai{
  align-self:flex-start;
  background:rgba(17,24,39,0.85);
}

/* MARKDOWN FIX */
.ai p{margin:6px 0;}
.ai ul{margin:6px 0 6px 18px;}
.ai h1,.ai h2,.ai h3{margin:6px 0;}

.ai code{
  background:#111;
  padding:3px 6px;
  border-radius:6px;
  color:#00ffcc;
}

.ai pre{
  background:#0d1117;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

/* INPUT */
.inputWrap{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:800px;
  padding:0 16px;
}

.box{
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:14px;
  background:rgba(17,24,39,0.9);
  border:1px solid var(--border);
}

input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-size:14px;
}

/* MOBILE */
@media(max-width:700px){
  .sidebar{
    position:fixed;
    left:-270px;
    top:0;
    height:100%;
    transition:0.3s;
    z-index:1000;
  }

  .sidebar.open{
    left:0;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="brand">D-AI</div>

  <div class="status">
    <span class="dot"></span>
    Online AI
  </div>

  <div class="btnRow">
    <button class="btn new" onclick="newChat()">New Chat</button>
    <button class="btn shuffle" onclick="randomize()">Shuffle</button>
  </div>

  <div class="card">
    Ask anything. Supports markdown, code, and formatting.
  </div>

  <div class="suggestions" id="suggestions"></div>

</div>

<!-- MAIN -->
<div class="main">

<header>
  <button onclick="toggleSidebar()">☰</button>
  <b>D-AI Chat</b>
</header>

<div id="chat"></div>

<div class="inputWrap">
  <div class="box">
    <input id="msg" placeholder="Message D-AI..." />
  </div>
</div>

</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("msg");
const suggestionsBox=document.getElementById("suggestions");

const sessionId=localStorage.getItem("sessionId")||crypto.randomUUID();
localStorage.setItem("sessionId",sessionId);

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* SUGGESTIONS */
const prompts=[
  "Explain AI simply",
  "Write Python code",
  "Startup ideas",
  "Teach JS basics"
];

function randomize(){
  suggestionsBox.innerHTML="";
  prompts.sort(()=>Math.random()-0.5).slice(0,4).forEach(p=>{
    const d=document.createElement("div");
    d.textContent=p;
    d.onclick=()=>input.value=p;
    suggestionsBox.appendChild(d);
  });
}

randomize();

/* CHAT */
function add(text,cls,isAI=false){
  const div=document.createElement("div");
  div.className="msg "+cls;

  if(isAI){
    div.innerHTML=marked.parse(text,{breaks:true});
  }else{
    div.textContent=text;
  }

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

/* SEND */
async function send(){
  const message=input.value.trim();
  if(!message)return;

  input.value="";

  add(message,"user");

  const ai=add("Thinking...","ai",true);

  try{
    const res=await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message,sessionId})
    });

    const data=await res.json();
    ai.innerHTML=marked.parse(data.reply,{breaks:true});

  }catch(e){
    ai.textContent="error 💀";
  }
}

/* 🔥 KEYBINDS RESTORED */

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

/* Ctrl / Cmd shortcuts */
document.addEventListener("keydown",(e)=>{

  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="k"){
    e.preventDefault();
    input.focus();
  }

  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="n"){
    e.preventDefault();
    newChat();
  }

  if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==="r"){
    e.preventDefault();
    randomize();
  }

  if(e.key==="Escape"){
    toggleSidebar();
  }
});

/* NEW CHAT */
function newChat(){
  chat.innerHTML="";
}

/* ENTER SEND */
input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter" && !e.shiftKey){
    send();
  }
});
</script>

</body>
</html>
