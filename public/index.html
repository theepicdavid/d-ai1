<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>D-AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
  --bg:#0a0c10;
  --panel:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#4f46e5;
  --user:#2563eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR (RESTORED ORIGINAL STYLE) */
.sidebar{
  width:270px;
  background:rgba(17,24,39,0.6);
  border-right:1px solid var(--border);
  backdrop-filter: blur(12px);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.brand{
  font-weight:800;
  font-size:16px;
  letter-spacing:1px;
}

.status{
  font-size:12px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.btnRow{
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-weight:600;
  font-size:12px;
}

.new{ background:var(--accent); color:white; }
.shuffle{ background:rgba(255,255,255,0.08); color:var(--text); }

.card{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

.suggestions div{
  padding:9px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
}
.suggestions div:hover{
  background:rgba(255,255,255,0.06);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
}

/* HEADER */
header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(15,23,42,0.5);
  backdrop-filter: blur(10px);
  display:flex;
  align-items:center;
  gap:10px;
}

/* CHAT */
#chat{
  flex:1;
  padding:24px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;

  /* FIX OVERLAP */
  padding-bottom:160px;
}

.msg{
  max-width:72%; /* KEEP YOUR ORIGINAL */
  padding:12px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.6;
  animation:pop .12s ease-out;
  white-space:pre-wrap;
}

@keyframes pop{
  from{transform:scale(0.98);opacity:0}
  to{transform:scale(1);opacity:1}
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border-bottom-right-radius:6px;
}

.ai{
  align-self:flex-start;
  background:rgba(17,24,39,0.85);
  border-bottom-left-radius:6px;
}

/* MARKDOWN FIX (REAL LOOK) */
.ai p{margin:6px 0;}
.ai ul{margin:6px 0 6px 18px;}
.ai h1{font-size:18px;margin:6px 0;}
.ai h2{font-size:16px;margin:6px 0;}

.ai code{
  background:#111;
  padding:3px 6px;
  border-radius:6px;
  color:#00ffcc;
}

.ai pre{
  background:#0d1117;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

/* INPUT */
.inputWrap{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:800px;
  padding:0 16px;
}

.box{
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:14px;
  background:rgba(17,24,39,0.9);
  border:1px solid var(--border);
  backdrop-filter: blur(12px);
}

input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  padding:10px;
  font-size:14px;
}

button.send{
  background:var(--accent);
  border:none;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
}

/* MOBILE */
@media (max-width:700px){
  .sidebar{
    position:fixed;
    left:-270px;
    top:0;
    height:100%;
    z-index:1000;
    transition:0.3s;
  }

  .sidebar.open{
    left:0;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR (FULL RESTORED) -->
<div class="sidebar" id="sidebar">

  <div class="brand">D-AI</div>

  <div class="status">
    <span class="dot"></span>
    Online AI Assistant
  </div>

  <div class="btnRow">
    <button class="btn new" onclick="newChat()">New Chat</button>
    <button class="btn shuffle" onclick="randomize()">Shuffle ideas ↻</button>
  </div>

  <div class="card">
    Ask for explanations, code, ideas, or summaries.  
    Supports **bold**, lists, and code blocks.
  </div>

  <div class="suggestions" id="suggestions"></div>

</div>

<!-- MAIN -->
<div class="main">

<header>
  <button onclick="toggleSidebar()">☰</button>
  <div>
    <div style="font-weight:700">D-AI Chat</div>
    <div style="font-size:12px;color:gray;">Your everyday AI assistant</div>
  </div>
</header>

<div id="chat"></div>

<div class="inputWrap">
  <div class="box">
    <input id="msg" placeholder="Say anything..." />
    <button class="send" onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("msg");
const suggestionsBox=document.getElementById("suggestions");

const sessionId=localStorage.getItem("sessionId")||crypto.randomUUID();
localStorage.setItem("sessionId",sessionId);

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* SUGGESTIONS */
const prompts=[
  "Explain quantum physics simply",
  "Give me startup ideas",
  "Write a Python function",
  "Teach JavaScript basics",
  "Explain black holes"
];

function randomize(){
  suggestionsBox.innerHTML="";
  prompts.sort(()=>Math.random()-0.5).slice(0,4).forEach(p=>{
    const d=document.createElement("div");
    d.textContent=p;
    d.onclick=()=>input.value=p;
    suggestionsBox.appendChild(d);
  });
}

randomize();

/* MESSAGES */
function add(text,cls,isAI=false){
  const div=document.createElement("div");
  div.className="msg "+cls;

  if(isAI){
    div.innerHTML=marked.parse(text,{breaks:true});
  }else{
    div.textContent=text;
  }

  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

/* SEND */
async function send(){
  const message=input.value.trim();
  if(!message)return;

  input.value="";

  add(message,"user");

  const ai=add("Thinking...","ai",true);

  try{
    const res=await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message,sessionId})
    });

    const data=await res.json();
    ai.innerHTML=marked.parse(data.reply,{breaks:true});

  }catch(e){
    ai.textContent="error contacting AI 💀";
  }
}
</script>

</body>
</html>
