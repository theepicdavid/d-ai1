<!DOCTYPE html>
<html>
<head>
  <title>D-AI</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b0f19;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 12px;
      text-align: center;
      background: #111827;
      border-bottom: 1px solid #222;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 75%;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      align-self: flex-end;
    }

    .ai {
      background: #1f2937;
      align-self: flex-start;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #111827;
      border-top: 1px solid #222;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      background: #0b1220;
      color: white;
    }

    button {
      margin-left: 10px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>D-AI 🤖</header>

<div id="chat"></div>

<div id="inputBox">
  <input id="msg" placeholder="Type something..." />
  <button id="sendBtn" onclick="send()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const btn = document.getElementById("sendBtn");

function add(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  input.value = "";

  add(message, "user");

  const aiMsg = add("Thinking...", "ai");

  btn.disabled = true;

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    aiMsg.textContent = data.reply;

  } catch (err) {
    aiMsg.textContent = "Error contacting AI.";
  }

  btn.disabled = false;
}

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
