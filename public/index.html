<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>D-AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
  --bg:#0a0c10;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#4f46e5;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:rgba(17,24,39,0.6);
  border-right:1px solid var(--border);
  backdrop-filter:blur(12px);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
  flex-shrink:0;
}

.brand{ font-weight:800; }

.status{
  font-size:12px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.btnRow{
  display:flex;
  gap:8px;
}

.btn{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  font-size:12px;
}

.new{
  background:var(--accent);
  color:white;
}

.shuffle{
  background:rgba(255,255,255,0.08);
  color:var(--text);
}

.card{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
}

.suggestions div{
  padding:9px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
}

.suggestions div:hover{
  background:rgba(255,255,255,0.06);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  position:relative;
}

header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(15,23,42,0.5);
  display:flex;
  align-items:center;
  gap:10px;
  min-height:64px;
}

.menuBtn{
  display:none;
  width:42px;
  height:42px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:var(--text);
  font-size:18px;
  cursor:pointer;
  align-items:center;
  justify-content:center;
}

/* CHAT */
#chat{
  flex:1;
  padding:24px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-bottom:160px;
}

.msg{
  max-width:72%;
  padding:12px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.6;
  white-space:pre-wrap;
  animation:pop .12s ease;
  word-wrap:break-word;
}

@keyframes pop{
  from{ transform:scale(0.98); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

.user{
  align-self:flex-end;
  background:#2563eb;
}

.ai{
  align-self:flex-start;
  background:rgba(17,24,39,0.85);
}

/* INPUT */
.inputWrap{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:800px;
  padding:0 16px;
}

.box{
  display:flex;
  gap:10px;
  padding:10px;
  border-radius:14px;
  background:rgba(17,24,39,0.9);
  border:1px solid var(--border);
}

input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--text);
  font-size:14px;
}

/* SEND BUTTON */
.sendBtn{
  width:42px;
  height:42px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:white;
  font-size:16px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:0.2s;
}

.sendBtn:hover{
  filter:brightness(1.1);
  transform:scale(1.05);
}

.sendBtn:active{
  transform:scale(0.95);
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(2px);
  opacity:0;
  pointer-events:none;
  transition:0.25s;
  z-index:999;
}

/* MOBILE */
@media(max-width:700px){

  .menuBtn{ display:flex; }

  .sidebar{
    position:fixed;
    left:-270px;
    top:0;
    height:100%;
    transition:0.3s;
    z-index:1000;
  }

  .sidebar.open{ left:0; }

  #overlay.show{
    opacity:1;
    pointer-events:auto;
  }

  .msg{ max-width:90%; }

  #chat{
    padding:16px;
    padding-bottom:160px;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">

  <div class="brand">D-AI</div>

  <div class="status">
    <span class="dot"></span>
    Online AI
  </div>

  <div class="btnRow">
    <button class="btn new" onclick="newChat()">New Chat</button>
    <button class="btn shuffle" onclick="randomize()">Shuffle</button>
  </div>

  <div class="card">
    Ask anything. Supports markdown, code, and formatting.
  </div>

  <div class="suggestions" id="suggestions"></div>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- MAIN -->
<div class="main">

<header>
  <button class="menuBtn" onclick="toggleSidebar()">☰</button>
  <b>D-AI Chat</b>
</header>

<div id="chat"></div>

<div class="inputWrap">
  <div class="box">
    <input id="msg" placeholder="Message D-AI..." />
    <button class="sendBtn" onclick="send()">➤</button>
  </div>
</div>

</div>

<script>
const chat=document.getElementById("chat");
const input=document.getElementById("msg");
const suggestionsBox=document.getElementById("suggestions");

const sessionId=localStorage.getItem("sessionId") || crypto.randomUUID();
localStorage.setItem("sessionId",sessionId);

/* SIDEBAR */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
}

function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
}

/* SUGGESTIONS */
const prompts=[
  "Explain AI simply",
  "Write Python code",
  "Startup ideas",
  "Teach JS basics"
];

function randomize(){
  suggestionsBox.innerHTML="";
  prompts.sort(()=>Math.random()-0.5).slice(0,4).forEach(p=>{
    const d=document.createElement("div");
    d.textContent=p;
    d.onclick=()=>{
      input.value=p;
      if(window.innerWidth<=700) closeSidebar();
      input.focus();
    };
    suggestionsBox.appendChild(d);
  });
}

randomize();

/* CHAT */
function add(text,cls,isAI=false){
  const div=document.createElement("div");
  div.className="msg "+cls;
  div.innerHTML = isAI ? marked.parse(text,{breaks:true}) : text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
  return div;
}

/* SEND */
async function send(){
  const message=input.value.trim();
  if(!message) return;

  input.value="";
  add(message,"user");

  const ai=add("Thinking...","ai",true);

  try{
    const res=await fetch("/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ message, sessionId })
    });

    const data=await res.json();
    ai.innerHTML = marked.parse(data.reply,{breaks:true});

  }catch(e){
    ai.textContent="error 💀";
  }
}

/* ENTER SEND */
input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter"){
    e.preventDefault();
    send();
  }
});

/* NEW CHAT */
function newChat(){
  chat.innerHTML="";
}
</script>

</body>
</html>
