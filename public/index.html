<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D-AI</title>

<!-- ✅ Markdown parser -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
  --bg:#0a0c10;
  --panel:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#4f46e5;
  --user:#2563eb;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:270px;
  background:rgba(17,24,39,0.6);
  border-right:1px solid var(--border);
  backdrop-filter: blur(12px);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  min-width:0;
  height:100vh;
}

header{
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:rgba(15,23,42,0.5);
}

/* CHAT */
#chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;
  padding-bottom:120px; /* ✅ prevents input overlap */
}

.msg{
  max-width:75%;
  padding:12px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
}

.user{
  align-self:flex-end;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

.ai{
  align-self:flex-start;
  background:rgba(17,24,39,0.85);
}

/* ✅ MARKDOWN STYLING */
.ai h1{font-size:18px;margin:6px 0}
.ai h2{font-size:16px;margin:6px 0}
.ai p{margin:6px 0}
.ai ul{margin:6px 0 6px 18px}
.ai code{
  background:#111;
  padding:3px 6px;
  border-radius:6px;
  color:#00ffcc;
}
.ai pre{
  background:#0d1117;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

/* INPUT */
.inputWrap{
  position:fixed; /* ✅ FIXED for mobile */
  bottom:0;
  left:0;
  width:100%;
  padding:10px;
  background:rgba(10,12,16,0.9);
}

.box{
  display:flex;
  gap:10px;
  max-width:800px;
  margin:auto;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

button{
  background:var(--accent);
  border:none;
  color:white;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:700px){
  .sidebar{
    display:none; /* ✅ cleaner mobile */
  }

  .msg{
    max-width:90%;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <b>D-AI</b>
</div>

<div class="main">

<header>D-AI Chat</header>

<div id="chat">
  <div class="empty">Start chatting</div>
</div>

<div class="inputWrap">
  <div class="box">
    <input id="msg" placeholder="Message D-AI..." />
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");

const sessionId =
  localStorage.getItem("sessionId") ||
  crypto.randomUUID();

localStorage.setItem("sessionId", sessionId);

function scrollBottom(){
  setTimeout(()=>{
    chat.scrollTop = chat.scrollHeight;
  },0);
}

function add(text, cls, isAI=false){
  const div=document.createElement("div");
  div.className="msg "+cls;

  // ✅ render markdown ONLY for AI
  if(isAI){
    div.innerHTML = marked.parse(text);
  } else {
    div.textContent = text;
  }

  chat.appendChild(div);
  scrollBottom();
  return div;
}

async function send(){
  const message=input.value.trim();
  if(!message) return;

  input.value="";

  add(message,"user");

  const ai=add("Thinking...","ai",true);

  try{
    const res=await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message, sessionId})
    });

    const data=await res.json();

    ai.innerHTML = marked.parse(data.reply);

  }catch(e){
    ai.textContent="something broke 💀 try again";
  }

  scrollBottom();
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter")send();
});
</script>

</body>
</html>
