<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>D-AI</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
:root{
  --bg:#0a0c10;
  --panel:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#e5e7eb;
  --muted:#9ca3af;
  --accent:#4f46e5;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
  height:100vh;
  display:flex;
}

/* SIDEBAR (YOUR ORIGINAL STYLE RESTORED) */
.sidebar{
  width:270px;
  background:rgba(17,24,39,0.6);
  border-right:1px solid var(--border);
  backdrop-filter: blur(12px);
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:0.3s;
}

.brand{
  font-weight:800;
}

.status{
  font-size:12px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 10px #22c55e;
}

.card{
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);
  font-size:12px;
  color:var(--muted);
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
  min-width:0;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-bottom:1px solid var(--border);
  background:rgba(15,23,42,0.5);
}

button{
  cursor:pointer;
  border:none;
  padding:8px 10px;
  border-radius:8px;
  background:var(--accent);
  color:white;
}

/* CHAT */
#chat{
  flex:1;
  padding:20px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:12px;

  /* FIX: prevents input overlap */
  padding-bottom:160px;
}

.msg{
  max-width:72%; /* 🔥 YOUR ORIGINAL KEPT */
  padding:12px 14px;
  border-radius:16px;
  font-size:14px;
  line-height:1.6;
  white-space:pre-wrap;
}

.user{
  align-self:flex-end;
  background:#2563eb;
}

.ai{
  align-self:flex-start;
  background:rgba(17,24,39,0.85);
}

/* MARKDOWN FIX (IMPORTANT) */
.ai p{margin:6px 0;}
.ai ul{margin:6px 0 6px 18px;}
.ai h1,.ai h2,.ai h3{margin:6px 0;}

.ai code{
  background:#111;
  padding:3px 6px;
  border-radius:6px;
  color:#00ffcc;
}

.ai pre{
  background:#0d1117;
  padding:10px;
  border-radius:10px;
  overflow-x:auto;
}

/* INPUT */
.inputWrap{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:12px;
  background:#0a0c10;
  border-top:1px solid rgba(255,255,255,0.08);
}

.box{
  max-width:800px;
  margin:auto;
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
}

/* MOBILE SIDEBAR */
@media(max-width:700px){
  .sidebar{
    position:fixed;
    left:-270px;
    top:0;
    height:100%;
    z-index:1000;
  }

  .sidebar.open{
    left:0;
  }
}
</style>
</head>

<body>

<!-- SIDEBAR (FULL RESTORED CONTENT) -->
<div class="sidebar" id="sidebar">

  <div class="brand">D-AI</div>

  <div class="status">
    <span class="dot"></span>
    Online AI Assistant
  </div>

  <div class="card">
    Ask for explanations, code, ideas, or summaries.<br>
    Supports markdown formatting.
  </div>

</div>

<!-- MAIN -->
<div class="main">

<header>
  <button onclick="toggleSidebar()">☰</button>
  <b>D-AI Chat</b>
</header>

<div id="chat"></div>

<div class="inputWrap">
  <div class="box">
    <input id="msg" placeholder="Say anything..." />
    <button onclick="send()">Send</button>
  </div>
</div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");

const sessionId =
  localStorage.getItem("sessionId") ||
  crypto.randomUUID();

localStorage.setItem("sessionId", sessionId);

/* SIDEBAR TOGGLE */
function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

/* ADD MESSAGE */
function add(text, cls, isAI=false){
  const div=document.createElement("div");
  div.className="msg "+cls;

  if(isAI){
    div.innerHTML = marked.parse(text, { breaks:true });
  } else {
    div.textContent=text;
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

/* SEND MESSAGE */
async function send(){
  const message=input.value.trim();
  if(!message) return;

  input.value="";

  add(message,"user");

  const ai=add("Thinking...","ai",true);

  try{
    const res=await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message, sessionId})
    });

    const data=await res.json();

    ai.innerHTML = marked.parse(data.reply, { breaks:true });

  }catch(e){
    ai.textContent="error contacting AI 💀";
  }
}

input.addEventListener("keydown",(e)=>{
  if(e.key==="Enter")send();
});
</script>

</body>
</html>
