<!DOCTYPE html>
<html>
<head>
  <title>D-AI</title>

  <style>
    :root{
      --bg:#0a0c10;
      --panel:#0f172a;
      --border:rgba(255,255,255,0.08);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#4f46e5;
      --user:#2563eb;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:var(--bg);
      color:var(--text);
      height:100vh;
      display:flex;
    }

    /* SIDEBAR */
    .sidebar{
      width:270px;
      background:rgba(17,24,39,0.6);
      border-right:1px solid var(--border);
      backdrop-filter: blur(12px);
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .brand{font-weight:800;font-size:16px}

    .status{
      font-size:12px;
      color:var(--muted);
      display:flex;
      align-items:center;
      gap:6px;
    }

    .dot{
      width:8px;height:8px;border-radius:50%;
      background:#22c55e;
      box-shadow:0 0 10px #22c55e;
    }

    .btnRow{display:flex;gap:8px}

    .btn{
      flex:1;
      padding:10px;
      border-radius:10px;
      border:none;
      cursor:pointer;
      font-weight:600;
      font-size:12px;
    }

    .new{background:var(--accent);color:white}
    .shuffle{background:rgba(255,255,255,0.08);color:var(--text)}

    .hint{font-size:11px;color:var(--muted)}

    .card{
      padding:10px;
      border-radius:10px;
      background:rgba(255,255,255,0.04);
      border:1px solid var(--border);
      font-size:12px;
      color:var(--muted);
    }

    .suggestions div{
      padding:9px;
      border-radius:8px;
      font-size:13px;
      cursor:pointer;
    }

    .suggestions div:hover{
      background:rgba(255,255,255,0.06);
    }

    /* MAIN */
    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:12px 16px;
      border-bottom:1px solid var(--border);
      background:rgba(15,23,42,0.5);
      backdrop-filter: blur(10px);
    }

    /* CHAT */
    #chat{
      flex:1;
      padding:24px;
      overflow-y:auto;
      display:flex;
      flex-direction:column;
      gap:12px;
      scroll-behavior:smooth;

      /* 👇 hide ugly scrollbar */
      scrollbar-width:none; /* Firefox */
    }

    #chat::-webkit-scrollbar{
      width:0px; /* Chrome/Safari */
    }

    .msg{
      max-width:72%;
      padding:12px 14px;
      border-radius:16px;
      font-size:14px;
      line-height:1.6;
      border:1px solid var(--border);
      animation:fadeIn 0.2s ease;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(6px)}
      to{opacity:1;transform:translateY(0)}
    }

    .user{
      align-self:flex-end;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
    }

    .ai{
      align-self:flex-start;
      background:rgba(17,24,39,0.85);
    }

    /* INPUT */
    .inputWrap{
      padding:16px;
      border-top:1px solid var(--border);
      background:rgba(15,23,42,0.6);
    }

    .box{
      display:flex;
      gap:10px;
      padding:10px;
      border-radius:14px;
      background:rgba(17,24,39,0.9);
      border:1px solid var(--border);
    }

    input{
      flex:1;
      background:transparent;
      border:none;
      outline:none;
      color:var(--text);
      padding:10px;
    }

    button{
      background:var(--accent);
      border:none;
      color:white;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
    }

    .typing{opacity:0.6;font-style:italic}
  </style>
</head>

<body>

<div class="sidebar">

  <div class="brand">D-AI</div>

  <div class="status">
    <span class="dot"></span>
    Online AI Assistant
  </div>

  <div class="btnRow">
    <button class="btn new" onclick="newChat()">New Chat</button>
    <button class="btn shuffle" onclick="randomize()">Shuffle ideas ↻</button>
  </div>

  <div class="hint">Shuffle gives you new prompt ideas</div>

  <div class="card">
    Ask for explanations, code, ideas, or summaries.
  </div>

  <div class="suggestions" id="suggestions"></div>

</div>

<div class="main">

  <header>D-AI Chat</header>

  <div id="chat"></div>

  <div class="inputWrap">
    <div class="box">
      <input id="msg" placeholder="Message..." />
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("msg");
const suggestionsBox = document.getElementById("suggestions");

const prompts = [
  "Explain quantum physics simply",
  "Write a Python sorting function",
  "Give me startup ideas",
  "Summarize AI in 2026",
  "Teach me JavaScript basics",
  "Explain black holes",
  "How does the internet work?",
  "Give me app ideas"
];

function randomize(){
  suggestionsBox.innerHTML = "";
  const pick = [...prompts].sort(()=>Math.random()-0.5).slice(0,4);
  pick.forEach(p=>{
    const d=document.createElement("div");
    d.textContent=p;
    d.onclick=()=>input.value=p;
    suggestionsBox.appendChild(d);
  });
}
randomize();

function newChat(){
  chat.innerHTML="";
}

function scrollToBottom(){
  setTimeout(()=>{
    chat.scrollTo({
      top: chat.scrollHeight,
      behavior: "smooth"
    });
  }, 50);
}

function add(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  scrollToBottom();
  return div;
}

async function send(){
  const message = input.value.trim();
  if(!message) return;

  input.value="";

  add(message,"user");

  const ai = add("Thinking...","ai typing");

  try{
    const res = await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message})
    });

    const data = await res.json();

    ai.classList.remove("typing");
    ai.textContent = data.reply;

    scrollToBottom();

  }catch{
    ai.textContent="Error.";
  }
}

input.addEventListener("keydown", e=>{
  if(e.key==="Enter") send();
});
</script>

</body>
</html>
